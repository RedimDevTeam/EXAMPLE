spring.application.name=b2c-integration-service
spring.datasource.url=jdbc:postgresql://localhost:5432/b2b_platform
spring.datasource.username=b2b_user
spring.datasource.password=b2b_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
redis.host=10.10.20.144
redis.port=6379
spring.data.redis.host=10.10.20.144
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
server.port=8086
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
b2c.provider.default-timeout-ms=5000
b2c.provider.default-retry-attempts=3
b2c.provider.retry-delay-ms=1000
b2c.provider.cache-ttl-hours=24
resilience4j.circuitbreaker.instances.providerApi.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.providerApi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.providerApi.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.providerApi.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.providerApi.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.providerApi.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.providerApi.failureRateThreshold=50
resilience4j.circuitbreaker.instances.providerApi.eventConsumerBufferSize=10
resilience4j.timelimiter.instances.providerApi.timeoutDuration=5s
logging.level.root=INFO
logging.level.com.b2bplatform=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
