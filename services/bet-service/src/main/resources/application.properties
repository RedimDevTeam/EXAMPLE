spring.application.name=bet-service
spring.datasource.url=jdbc:postgresql://localhost:5432/b2b_platform
spring.datasource.username=b2b_user
spring.datasource.password=b2b_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
redis.host=10.10.20.144
redis.port=6379
spring.data.redis.host=10.10.20.144
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
server.port=8084
gateway.url=
eureka.client.registerWithEureka=true
eureka.client.fetchRegistry=true
eureka.client.serviceUrl.defaultZone=http://localhost:10000/eureka/
eureka.instance.preferIpAddress=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
wallet.service.url=http://localhost:8083
wallet.service.timeout=5000ms
game.service.url=http://localhost:8089
game.service.timeout=3000ms
operator.webhook.timeout=3000ms
session.service.url=http://localhost:8085
session.service.timeout=2000ms
bet.min-amount=0.01
bet.max-amount=10000.00
bet.default-currency=USD
bet.cache-ttl-hours=24
bet.idempotency-ttl-hours=24
resilience4j.circuitbreaker.instances.walletService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.walletService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.walletService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.walletService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.walletService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.walletService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.walletService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.walletService.eventConsumerBufferSize=10
resilience4j.circuitbreaker.instances.gameService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.gameService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.gameService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.gameService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.gameService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.gameService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.gameService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.gameService.eventConsumerBufferSize=10
resilience4j.timelimiter.instances.walletService.timeoutDuration=5s
resilience4j.timelimiter.instances.gameService.timeoutDuration=3s
logging.level.root=INFO
logging.level.com.b2bplatform=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
