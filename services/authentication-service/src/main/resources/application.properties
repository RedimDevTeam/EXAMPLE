spring.application.name=authentication-service

spring.datasource.url=jdbc:postgresql://localhost:5432/b2b_platform
spring.datasource.username=b2b_user
spring.datasource.password=b2b_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

redis.host=10.10.20.144
redis.port=6379
spring.data.redis.host=10.10.20.144
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

spring.security.user.name=admin
spring.security.user.password=admin

redis.flush-on-startup=false

server.port=8087

eureka.client.registerWithEureka=true
eureka.client.fetchRegistry=true
eureka.client.serviceUrl.defaultZone=http://localhost:10000/eureka/
eureka.instance.preferIpAddress=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

jwt.secret=dev-secret-key-change-in-production-min-256-bits
jwt.access-token-expiration=3600
jwt.refresh-token-expiration=604800

operator.service.url=http://localhost:8081
operator.service.timeout=2000ms

session.service.url=http://localhost:8085
session.service.timeout=2000ms

auth.launch-url-base=http://localhost:8080/game
auth.max-login-attempts=5
auth.lockout-duration-minutes=30
auth.password.min-length=8
auth.password.require-uppercase=true
auth.password.require-lowercase=true
auth.password.require-digit=true
auth.password.require-special=false

logging.level.root=INFO
logging.level.com.b2bplatform=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
